{% extends "base.html" %}

{% block auth_content %}
<div class="login-page">
    <div class="login-box">
        <div class="login-header">
            <div class="login-logo">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" style="width: 64px; height: 64px; object-fit: contain;">
            </div>
            <h1>SMART CARD</h1>
            <p>TNI AD — Poltekad</p>
        </div>

        <div class="login-card">
            <h2>MASUK KE SISTEM</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash-message flash-{{ category }}" style="margin-bottom: 16px;">
                <i class="bi bi-{% if category == 'danger' %}exclamation-triangle-fill{% else %}info-circle-fill{% endif %}"></i>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Masukkan username" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-wrap">
                        <input type="password" id="login-password" name="password" class="form-input" placeholder="Masukkan password" required>
                        <button type="button" class="password-toggle" id="login-password-toggle"
                                aria-label="Tampilkan password" tabindex="-1">
                            <i class="bi bi-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary login-btn">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Masuk
                </button>
            </form>
        </div>
    </div>
</div>

<script>
(function () {
    var input = document.getElementById('login-password');
    var btn = document.getElementById('login-password-toggle');
    if (!input || !btn) return;
    btn.addEventListener('click', function () {
        var showing = input.getAttribute('type') === 'text';
        input.setAttribute('type', showing ? 'password' : 'text');
        btn.setAttribute('aria-label', showing ? 'Tampilkan password' : 'Sembunyikan password');
        var icon = btn.querySelector('i');
        if (icon) {
            icon.classList.toggle('bi-eye', showing);
            icon.classList.toggle('bi-eye-slash', !showing);
        }
    });
})();
</script>
{% endblock %}
