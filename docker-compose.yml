version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: kartu-pintar-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: KartuPintar2025!
      MYSQL_DATABASE: kartu_pintar
      MYSQL_USER: kartu_pintar
      MYSQL_PASSWORD: KartuPintar2025!
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: kartu-pintar-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=kartu-pintar-production-secret-2025-poltekad
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=kartu_pintar
      - DB_PASSWORD=KartuPintar2025!
      - DB_NAME=kartu_pintar
      - FINDMY_UPDATE_INTERVAL=60
      # Sudah dedicated findmy-worker service di bawah → gunicorn tidak ikut jalanin worker
      - FINDMY_AUTO_START=0
    volumes:
      - uploads_data:/app/static/uploads
      - findmy_auth:/app/findmy_tools/Auth
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  findmy-worker:
    build: .
    container_name: kartu-pintar-findmy-worker
    restart: unless-stopped
    command: ["python", "-u", "findmy_worker.py"]
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=kartu-pintar-production-secret-2025-poltekad
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=kartu_pintar
      - DB_PASSWORD=KartuPintar2025!
      - DB_NAME=kartu_pintar
      - FINDMY_UPDATE_INTERVAL=60
      # ⚠️  WAJIB 0 di sini! Kalau tidak, worker jalan 2x:
      #   - Sekali dari app.py module-level (saat `from app import app`)
      #   - Sekali dari findmy_worker.py main()
      # Dobel worker = dobel spam Google API.
      - FINDMY_AUTO_START=0
    volumes:
      - findmy_auth:/app/findmy_tools/Auth
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kartu-pintar-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiMzMxNzU2MDBhMmM3OGQzMTQwMjk2MDI5ZmRhZjNlYmEiLCJ0IjoiOWU4ZGI1Y2EtNWJmYi00MDFkLTgxM2UtNGQ0MzIwYjAwODIyIiwicyI6IllqQTRNbUpsWW1FdFltSmlZUzAwT1RSaUxUaGhZV1V0TnpjeFkyUXdOelpoTkRGayJ9
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  uploads_data:
  findmy_auth:
