version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: kartu-pintar-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: KartuPintar2025!
      MYSQL_DATABASE: kartu_pintar
      MYSQL_USER: kartu_pintar
      MYSQL_PASSWORD: KartuPintar2025!
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: kartu-pintar-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=kartu-pintar-production-secret-2025-poltekad
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=kartu_pintar
      - DB_PASSWORD=KartuPintar2025!
      - DB_NAME=kartu_pintar
      - FINDMY_UPDATE_INTERVAL=60
      # ⚠️  PATCH: Set ke 0 kalau kamu aktifkan service `findmy-worker` di bawah,
      # supaya gunicorn TIDAK ikut jalanin worker (biar web tetap ringan).
      # Kalau kamu cuma pakai service `web` aja, biarkan 1 (default).
      - FINDMY_AUTO_START=0
    volumes:
      - uploads_data:/app/static/uploads
      # ⚠️  PATCH: Persist secrets.json antar rebuild supaya nggak perlu
      # login Google ulang tiap `docker compose down`
      - findmy_auth:/app/findmy_tools/Auth
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ============================================================
  # (OPSIONAL tapi DIREKOMENDASIKAN) — Dedicated FindMy worker
  # ============================================================
  # Kenapa dipisah: worker FindMy butuh long-running thread + FCM listener.
  # Ini ga cocok nempel di gunicorn (web worker harus ringan & stateless).
  # Dengan service terpisah:
  #   - Web (gunicorn) bisa di-scale/restart tanpa ganggu tracking
  #   - Worker bisa di-restart kalau macet tanpa turunin web
  #   - Log lebih clean, terpisah per concern
  #
  # CARA PAKAI:
  #   1. Set `FINDMY_AUTO_START=0` di service `web` di atas
  #   2. Uncomment block `findmy-worker` di bawah
  #   3. `docker compose up -d --build`
  #
  # Kalau ga mau repot, biarkan saja (worker tetap jalan di dalam gunicorn).
  # ============================================================

  findmy-worker:
    build: .
    container_name: kartu-pintar-findmy-worker
    restart: unless-stopped
    command: ["python", "-u", "findmy_worker.py"]
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=kartu-pintar-production-secret-2025-poltekad
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=kartu_pintar
      - DB_PASSWORD=KartuPintar2025!
      - DB_NAME=kartu_pintar
      - FINDMY_UPDATE_INTERVAL=60
    volumes:
      - findmy_auth:/app/findmy_tools/Auth
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kartu-pintar-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiMzMxNzU2MDBhMmM3OGQzMTQwMjk2MDI5ZmRhZjNlYmEiLCJ0IjoiOWU4ZGI1Y2EtNWJmYi00MDFkLTgxM2UtNGQ0MzIwYjAwODIyIiwicyI6IllqQTRNbUpsWW1FdFltSmlZUzAwT1RSaUxUaGhZV1V0TnpjeFkyUXdOelpoTkRGayJ9
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  uploads_data:
  findmy_auth: # ⚠️  PATCH: new — persist secrets.json
